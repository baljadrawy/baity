# ============================================================
# docker-compose.dev.yml — "بيتي" (بيئة التطوير المحلي)
# الاستخدام: docker compose -f docker-compose.dev.yml up -d
# ============================================================

version: '3.9'

services:
  # ---- PostgreSQL 16 ----
  postgres:
    image: postgres:16-alpine
    container_name: baity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: baity_user
      POSTGRES_PASSWORD: baity_dev_password
      POSTGRES_DB: baity_dev
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --lc-collate=ar_SA.UTF-8 --lc-ctype=ar_SA.UTF-8'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U baity_user -d baity_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis (BullMQ + Cache) ----
  redis:
    image: redis:7-alpine
    container_name: baity_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Next.js App (التطوير) ----
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: baity_app
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://baity_user:baity_dev_password@postgres:5432/baity_dev
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  # ---- Adminer (إدارة قاعدة البيانات في التطوير) ----
  adminer:
    image: adminer:4
    container_name: baity_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: baity_network
