<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="بيتي">
  <defs>
    <linearGradient id="goldBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d49a"/>
      <stop offset="55%" stop-color="#c9a961"/>
      <stop offset="100%" stop-color="#a8893e"/>
    </linearGradient>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffbf2"/>
      <stop offset="100%" stop-color="#f5e9c8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- خلفية ذهبية -->
  <rect width="512" height="512" rx="96" fill="url(#goldBg)"/>

  <!-- البيت — مثلث + جسم -->
  <g filter="url(#shadow)">
    <!-- السطح -->
    <path d="M 256 92 L 416 232 L 384 232 L 384 396 Q 384 412 368 412 L 144 412 Q 128 412 128 396 L 128 232 L 96 232 Z" fill="url(#houseGrad)"/>
    <!-- الباب -->
    <rect x="220" y="296" width="72" height="116" rx="10" fill="#a8893e"/>
    <circle cx="278" cy="356" r="4" fill="#fff"/>
    <!-- شبابيك -->
    <rect x="156" y="266" width="48" height="48" rx="6" fill="#c9a961"/>
    <rect x="308" y="266" width="48" height="48" rx="6" fill="#c9a961"/>
  </g>

  <!-- نخلة بسيطة -->
  <g transform="translate(420 380)" opacity="0.92">
    <rect x="-4" y="-30" width="8" height="40" rx="3" fill="#7a5e2a"/>
    <path d="M 0 -30 Q -22 -42 -36 -28 Q -22 -28 -8 -22 Q -2 -32 0 -30" fill="#3d8b3d"/>
    <path d="M 0 -30 Q 22 -42 36 -28 Q 22 -28 8 -22 Q 2 -32 0 -30" fill="#3d8b3d"/>
    <path d="M 0 -30 Q -10 -56 6 -64 Q 6 -50 4 -34 Q 2 -34 0 -30" fill="#4ba84b"/>
  </g>
</svg>
